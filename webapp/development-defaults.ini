
campaign_url = "https://waspbountyhunters.obsidianportal.com"

# Great Clan ruling families: their main line gets the +2.0 rank bonus at
# Deputy Minister and above (ordinary Great Clan families get +1.0). Imperial
# families always count as ruling regardless of this list. A clan counts as a
# Great Clan iff it has a ruling family listed here; minor clans get no bonus.
