<!--
  Trimmed, faithful excerpt of a real authenticated Obsidian Portal character
  page (daidoji-no-etsuko-jitsuyo). Preserves the exact tagline markup the live
  page returns - the empty banner <h5 class='tagline'> and the populated body
  <div class='tagline'> - so opsynth.parse_tagline is tested against the real
  element structure. Surrounding private GM content is intentionally omitted so
  no campaign-private data is committed.
-->
<div id='page'>
  <div id='banner-container'>
    <div class='highlight-container'></div>
    <h5 class='tagline'></h5>
  </div>
  <div class='character-profile'>
    <h1 class='page-title'>Daidoji no Etsuko Jitsuyo</h1>
    <ul class='tag-list'>
      <li><a href="/search?tag=Crane+Clan">Crane Clan</a></li>
      <li><a href="/search?tag=Daidoji+Family">Daidoji Family</a></li>
    </ul>
    <div class='tagline'> <p> <em>drinking companion of Kyoma</em> </p> </div>
    <div class='description' itemprop='text'>
      <h6>Description:</h6>
      <div class='content'><p>A name derived from the fusion of practical and useful.</p></div>
    </div>
  </div>
</div>
