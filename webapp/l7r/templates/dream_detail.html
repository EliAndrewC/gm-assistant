{% extends "_layout.html" %}

{% block title %}L7R dreams: {{ scene.title }}{% endblock %}

{% block content %}
<nav class="container detail-nav">
  <a class="back-link" href="/dreams">← back to dreams</a>
</nav>

<section class="container">
  <header class="detail-hero">
    <p class="detail-hero__supertitle">A dream-omen sought of {{ scene.sender }}</p>
    <h1 class="detail-hero__name">{{ scene.title }}</h1>
  </header>
</section>

<article class="container">
  <div class="dream-prose detail-prose">
    {{ scene.body_html|safe }}
  </div>
</article>

<footer class="container">
  <div class="detail-footer">
    <div class="detail-footer__nav">
      <a class="detail-footer__link detail-footer__link--prev" href="/dreams">
        <strong>← all dreams</strong>
        the framework and gallery
      </a>
    </div>
  </div>
</footer>
{% endblock %}
